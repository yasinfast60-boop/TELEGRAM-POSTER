<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ارسال پست به کانال</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Vazirmatn', Tahoma, Arial, sans-serif; background: #fafaf9; color: #1c1917; min-height: 100vh; }
    .container { max-width: 560px; margin: 0 auto; padding: 24px 16px 40px; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .logo { width: 44px; height: 44px; border-radius: 50%; background: #7f1d1d; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .header h1 { font-size: 18px; font-weight: 800; }
    .header p { font-size: 13px; color: #78716c; }
    .sw-status { font-size: 12px; padding: 8px 12px; border-radius: 10px; margin-bottom: 12px; text-align: center; }
    .sw-status.ok { background: #ecfdf5; color: #065f46; }
    .sw-status.warn { background: #fffbeb; color: #92400e; }
    .settings-toggle { width: 100%; display: flex; align-items: center; justify-content: space-between; background: #fff; border: 1px solid #e7e5e4; border-radius: 12px; padding: 12px 16px; font-size: 13px; color: #57534e; cursor: pointer; margin-bottom: 8px; font-family: inherit; }
    .settings-toggle .left { display: flex; align-items: center; gap: 8px; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; }
    .badge.green { background: #ecfdf5; color: #065f46; }
    .badge.amber { background: #fffbeb; color: #92400e; }
    .settings-panel { background: #fff; border: 1px solid #e7e5e4; border-radius: 12px; padding: 16px; margin-bottom: 20px; display: none; }
    .settings-panel.open { display: block; }
    .divider { border: none; border-top: 1px solid #f5f5f4; margin: 12px 0; }
    .section-title { font-size: 11px; font-weight: 700; color: #a8a29e; margin-bottom: 10px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 13px; color: #57534e; margin-bottom: 4px; }
    .field input, .field textarea { width: 100%; border: 1px solid #e7e5e4; border-radius: 10px; padding: 8px 12px; font-size: 13px; font-family: inherit; outline: none; background: #fff; }
    .field input:focus, .field textarea:focus { border-color: #7f1d1d; }
    .field input[dir="ltr"] { font-family: monospace; direction: ltr; text-align: left; }
    .hint { font-size: 11px; color: #a8a29e; margin-top: 4px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .post-card { background: #fff; border: 1px solid #e7e5e4; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
    .post-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .post-num { font-size: 11px; font-weight: 700; color: #a8a29e; }
    .btn-remove { background: none; border: none; cursor: pointer; color: #d4d0cd; font-size: 16px; padding: 4px; }
    .btn-remove:hover { color: #f87171; }
    .schedule-box { background: #fafaf9; border: 1px solid #f0efee; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
    .schedule-box .schedule-title { font-size: 11px; font-weight: 700; color: #a8a29e; margin-bottom: 8px; }
    .schedule-status { font-size: 12px; margin-top: 8px; padding: 6px 10px; border-radius: 8px; display: none; }
    .schedule-status.waiting { background: #fffbeb; color: #92400e; display: block; }
    .schedule-status.sent { background: #ecfdf5; color: #065f46; display: block; }
    .image-upload { border: 2px dashed #e7e5e4; border-radius: 10px; padding: 14px; text-align: center; cursor: pointer; color: #a8a29e; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; }
    .image-upload:hover { border-color: #fecaca; color: #f87171; }
    .image-preview { position: relative; border: 1px solid #e7e5e4; border-radius: 10px; overflow: hidden; background: #fafaf9; margin-bottom: 12px; }
    .image-preview img { width: 100%; max-height: 220px; object-fit: contain; display: block; }
    .btn-img-remove { position: absolute; top: 8px; left: 8px; width: 24px; height: 24px; border-radius: 50%; background: rgba(28,25,23,0.7); color: #fff; border: none; cursor: pointer; font-size: 14px; }
    .btn-send { width: 100%; padding: 12px; border-radius: 10px; border: none; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-send.idle { background: #7f1d1d; color: #fff1f2; }
    .btn-send.idle:hover { background: #991b1b; }
    .btn-send.scheduled { background: #fffbeb; color: #92400e; border: 1px solid #fcd34d; }
    .btn-send.sending { background: #e7e5e4; color: #a8a29e; cursor: not-allowed; }
    .btn-send.sent { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
    .btn-send.error { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
    .btn-add { width: 100%; padding: 12px; border-radius: 12px; border: 2px dashed #e7e5e4; background: none; font-family: inherit; font-size: 13px; color: #a8a29e; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-add:hover { border-color: #fecaca; color: #f87171; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.15); border-top-color: currentColor; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    textarea { resize: none; line-height: 1.8; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff1f2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
    </div>
    <div>
      <h1>ارسال پست به کانال</h1>
      <p>ارسال محتوا با دکمه‌های استعلام قیمت و ثبت سفارش</p>
    </div>
  </div>

  <div class="sw-status warn" id="sw-status">در حال راه‌اندازی سرویس پس‌زمینه...</div>

  <button class="settings-toggle" onclick="toggleSettings()">
    <span class="left">
      ✈ تنظیمات تلگرام
      <span class="badge amber" id="conn-badge">تنظیم نشده</span>
    </span>
    <span id="chevron">▾</span>
  </button>

  <div class="settings-panel" id="settings-panel">
    <div class="section-title">اتصال به کانال تلگرام</div>
    <div class="field">
      <label>توکن ربات</label>
      <input type="text" id="bot-token" dir="ltr" autocomplete="off" spellcheck="false"
        placeholder="توکنی که از ربات‌ساز تلگرام گرفتی" oninput="saveSettings()" />
    </div>
    <div class="field">
      <label>نام کاربری کانال</label>
      <input type="text" id="channel-username" dir="ltr" autocomplete="off"
        placeholder="@yourchannel" oninput="saveSettings()" />
      <div class="hint">نام کاربری کانال باید با علامت @ شروع شود.</div>
    </div>
    <hr class="divider" />
    <div class="hint">این اطلاعات فقط روی همین دستگاه ذخیره می‌شود.</div>
  </div>

  <div id="posts-container"></div>
  <button class="btn-add" onclick="addPost()">+ افزودن پست جدید</button>
</div>

<script>
const ORDER_FORM = 'https://docs.google.com/forms/d/e/1FAIpQLScJzvqAw73FQlwKmFtYHddTuJUGoBbmZC0ePU-H3rWf2VLKyQ/viewform?usp=pp_url&entry.1557141807=';
const PRICE_FORM = 'https://docs.google.com/forms/d/e/1FAIpQLScf8SDrEMs241o8fQdobhztgQDP4WYgZ3k8DqTqLfMAIJfp4g/viewform?usp=pp_url&entry.1028500682=';

let posts = [{ id: 1, image: null, scheduled: false }];
let postCounter = 1;
let swReady = false;

function toPersian(n) {
  return String(n).replace(/[0-9]/g, d => '۰۱۲۳۴۵۶۷۸۹'[d]);
}

// راه‌اندازی سرویس‌ورکر
async function initSW() {
  if (!('serviceWorker' in navigator)) {
    document.getElementById('sw-status').textContent = '⚠ مرورگر شما از سرویس پس‌زمینه پشتیبانی نمی‌کند.';
    return;
  }
  try {
    const reg = await navigator.serviceWorker.register('./sw.js');
    await navigator.serviceWorker.ready;
    swReady = true;
    document.getElementById('sw-status').className = 'sw-status ok';
    document.getElementById('sw-status').textContent = '✓ سرویس پس‌زمینه فعال است - پست‌ها حتی در پس‌زمینه ارسال می‌شوند';
    
    navigator.serviceWorker.addEventListener('message', (event) => {
      const { type, postId } = event.data;
      if (type === 'POST_SENT') {
        const post = posts.find(p => p.id === postId);
        if (post) { post.scheduled = false; }
        const btn = document.getElementById('btn-' + postId);
        const statusEl = document.getElementById('status-' + postId);
        if (btn) { btn.className = 'btn-send sent'; btn.textContent = '✓ ارسال شد'; setTimeout(() => { btn.className = 'btn-send idle'; btn.textContent = 'ارسال / زمان‌بندی'; btn.onclick = () => scheduleOrSend(postId); }, 3000); }
        if (statusEl) { statusEl.className = 'schedule-status sent'; statusEl.textContent = '✓ پست با موفقیت ارسال شد'; }
      }
    });
  } catch(e) {
    document.getElementById('sw-status').textContent = '⚠ سرویس پس‌زمینه راه‌اندازی نشد. پیج را رفرش کنید.';
  }
}

function load() {
  document.getElementById('bot-token').value = localStorage.getItem('bot-token') || '';
  document.getElementById('channel-username').value = localStorage.getItem('channel-username') || '';
  updateBadge();
  renderPosts();
  initSW();
}

function saveSettings() {
  localStorage.setItem('bot-token', document.getElementById('bot-token').value);
  localStorage.setItem('channel-username', document.getElementById('channel-username').value);
  updateBadge();
}

function updateBadge() {
  const ok = document.getElementById('bot-token').value.trim() && document.getElementById('channel-username').value.trim();
  const b = document.getElementById('conn-badge');
  b.textContent = ok ? 'متصل' : 'تنظیم نشده';
  b.className = ok ? 'badge green' : 'badge amber';
}

function toggleSettings() {
  const panel = document.getElementById('settings-panel');
  panel.classList.toggle('open');
  document.getElementById('chevron').textContent = panel.classList.contains('open') ? '▴' : '▾';
}

function addPost() {
  postCounter++;
  posts.push({ id: postCounter, image: null, scheduled: false });
  renderPosts();
}

function removePost(id) {
  if (posts.length <= 1) return;
  cancelSchedule(id);
  posts = posts.filter(p => p.id !== id);
  renderPosts();
}

function renderPosts() {
  const container = document.getElementById('posts-container');
  container.innerHTML = '';
  posts.forEach((post, index) => {
    const div = document.createElement('div');
    div.className = 'post-card';
    div.id = 'card-' + post.id;
    const now = new Date();
    const dateVal = post.scheduledDate || now.toISOString().split('T')[0];
    const timeVal = post.scheduledTime || '18:00';
    div.innerHTML = `
      <div class="post-header">
        <span class="post-num">پست ${toPersian(index + 1)}</span>
        ${posts.length > 1 ? `<button class="btn-remove" onclick="removePost(${post.id})">✕</button>` : ''}
      </div>
      <div class="field">
        <label>عنوان محصول</label>
        <input type="text" id="title-${post.id}" value="${post.title || ''}"
          placeholder="نام محصول (برای دکمه‌های فرم)"
          oninput="updateField(${post.id},'title',this.value)" />
      </div>
      <div class="field">
        <label>متن کپشن</label>
        <textarea id="caption-${post.id}" rows="5"
          placeholder="متن پست را اینجا وارد یا پیست کن..."
          oninput="updateField(${post.id},'caption',this.value)">${post.caption || ''}</textarea>
      </div>
      <div id="image-area-${post.id}">
        ${post.image
          ? `<div class="image-preview"><img src="${post.image.previewUrl}" /><button class="btn-img-remove" onclick="removeImage(${post.id})">✕</button></div>`
          : `<label class="image-upload">📷 افزودن عکس (اختیاری)<input type="file" accept="image/*" style="display:none" onchange="handleImage(${post.id}, this)" /></label>`
        }
      </div>
      <div class="schedule-box">
        <div class="schedule-title">زمان‌بندی ارسال (اختیاری)</div>
        <div class="row">
          <div class="field" style="margin-bottom:0">
            <label>تاریخ</label>
            <input type="date" id="date-${post.id}" value="${dateVal}" min="${now.toISOString().split('T')[0]}" oninput="updateField(${post.id},'scheduledDate',this.value)" />
          </div>
          <div class="field" style="margin-bottom:0">
            <label>ساعت</label>
            <input type="time" id="time-${post.id}" value="${timeVal}" oninput="updateField(${post.id},'scheduledTime',this.value)" />
          </div>
        </div>
        <div class="schedule-status ${post.scheduled ? 'waiting' : ''}" id="status-${post.id}">
          ${post.scheduled ? '⏳ زمان‌بندی شده - حتی در پس‌زمینه ارسال می‌شود' : ''}
        </div>
      </div>
      <button class="btn-send ${post.scheduled ? 'scheduled' : 'idle'}" id="btn-${post.id}"
        onclick="${post.scheduled ? `cancelSchedule(${post.id})` : `scheduleOrSend(${post.id})`}">
        ${post.scheduled ? '⏳ زمان‌بندی شده - لغو کن' : 'ارسال / زمان‌بندی'}
      </button>
    `;
    container.appendChild(div);
  });
}

function updateField(id, field, value) {
  const post = posts.find(p => p.id === id);
  if (post) post[field] = value;
}

function handleImage(id, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const match = reader.result.match(/^data:(.*);base64,(.*)$/);
    if (!match) return;
    const post = posts.find(p => p.id === id);
    if (post) post.image = { mediaType: match[1], base64: match[2], previewUrl: reader.result };
    renderPosts();
  };
  reader.readAsDataURL(file);
}

function removeImage(id) {
  const post = posts.find(p => p.id === id);
  if (post) post.image = null;
  renderPosts();
}

async function scheduleOrSend(id) {
  const post = posts.find(p => p.id === id);
  if (!post) return;
  const caption = (post.caption || '').trim();
  if (!caption) { alert('متن کپشن را وارد کن.'); return; }

  const token = localStorage.getItem('bot-token') || '';
  const channel = localStorage.getItem('channel-username') || '';
  if (!token || !channel) { toggleSettings(); return; }

  const dateVal = post.scheduledDate || new Date().toISOString().split('T')[0];
  const timeVal = post.scheduledTime || '18:00';
  const scheduledAt = new Date(dateVal + 'T' + timeVal).getTime();
  const now = Date.now();

  if (scheduledAt <= now) {
    await doSend(id);
    return;
  }

  post.scheduled = true;
  const btn = document.getElementById('btn-' + id);
  const statusEl = document.getElementById('status-' + id);
  if (btn) { btn.className = 'btn-send scheduled'; btn.textContent = '⏳ زمان‌بندی شده - لغو کن'; btn.onclick = () => cancelSchedule(id); }
  if (statusEl) { statusEl.className = 'schedule-status waiting'; statusEl.textContent = '⏳ زمان‌بندی شده - حتی در پس‌زمینه ارسال می‌شود'; }

  if (swReady && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({
      type: 'SCHEDULE_POST',
      post: { id, token, channel, caption, title: post.title || '', imageData: post.image, scheduledAt }
    });
  }
}

async function cancelSchedule(id) {
  const post = posts.find(p => p.id === id);
  if (!post) return;
  post.scheduled = false;
  if (swReady && navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage({ type: 'CANCEL_POST', post: { id } });
  }
  const btn = document.getElementById('btn-' + id);
  const statusEl = document.getElementById('status-' + id);
  if (btn) { btn.className = 'btn-send idle'; btn.textContent = 'ارسال / زمان‌بندی'; btn.onclick = () => scheduleOrSend(id); }
  if (statusEl) { statusEl.className = 'schedule-status'; statusEl.textContent = ''; }
}

function base64ToBlob(base64, mediaType) {
  const byteChars = atob(base64);
  const bytes = new Uint8Array(byteChars.length);
  for (let i = 0; i < byteChars.length; i++) bytes[i] = byteChars.charCodeAt(i);
  return new Blob([bytes], { type: mediaType });
}

async function doSend(id) {
  const token = localStorage.getItem('bot-token') || '';
  const channel = localStorage.getItem('channel-username') || '';
  const post = posts.find(p => p.id === id);
  if (!post) return;
  const caption = (post.caption || '').trim();
  const title = (post.title || '').trim();
  const btn = document.getElementById('btn-' + id);
  if (btn) { btn.className = 'btn-send sending'; btn.innerHTML = '<span class="spinner"></span> در حال ارسال...'; }
  const safeTitle = encodeURIComponent(title || caption.slice(0, 30));
  const replyMarkup = { inline_keyboard: [[{ text: '· استعلام قیمت ·', url: PRICE_FORM + safeTitle }, { text: '· ثبت سفارش ·', url: ORDER_FORM + safeTitle }]] };
  try {
    let resp;
    if (post.image) {
      const blob = base64ToBlob(post.image.base64, post.image.mediaType);
      const fd = new FormData();
      fd.append('chat_id', channel); fd.append('caption', caption); fd.append('photo', blob, 'photo.jpg'); fd.append('reply_markup', JSON.stringify(replyMarkup));
      resp = await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: fd });
    } else {
      resp = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: channel, text: caption, reply_markup: replyMarkup }) });
    }
    const data = await resp.json();
    if (data.ok) {
      if (btn) { btn.className = 'btn-send sent'; btn.textContent = '✓ ارسال شد'; setTimeout(() => { btn.className = 'btn-send idle'; btn.textContent = 'ارسال / زمان‌بندی'; btn.onclick = () => scheduleOrSend(id); }, 3000); }
    } else { throw new Error(); }
  } catch {
    if (btn) { btn.className = 'btn-send error'; btn.textContent = '⚠ خطا - دوباره تلاش کن'; btn.onclick = () => scheduleOrSend(id); setTimeout(() => { btn.className = 'btn-send idle'; btn.textContent = 'ارسال / زمان‌بندی'; btn.onclick = () => scheduleOrSend(id); }, 3000); }
  }
}

load();
</script>
</body>
</html>
